<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    @font-face {
      font-display: swap;
      font-family: "Roboto Slab";
      font-style: normal;
      font-weight: 400;
      src: url("./static/fonts/roboto-slab-v36-greek_latin-regular.woff2") format("woff2");
    }

    @font-face {
      font-display: swap;
      font-family: "Roboto Slab";
      font-style: normal;
      font-weight: 700;
      src: url("./static/fonts/roboto-slab-v36-greek_latin-700.woff2") format("woff2");
    }

    @font-face {
      font-display: swap;
      font-family: "JetBrains Mono";
      font-style: normal;
      font-weight: 400;
      src: url("./static/fonts/jetbrains-mono-v24-greek_latin-regular.woff2") format("woff2");
    }

    :root {
      --bg: #111111;
      --text: #dddddd;
      --muted: #999999;
      --line: #333333;
      --link: #9bbcff;
      --support-link: #e78ac3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      width: 1200px;
      height: 630px;
      margin: 0;
      padding: 54px 64px;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto Slab", serif;
      overflow: hidden;
    }

    .card {
      display: flex;
      flex-direction: column;
      height: 100%;
      border-top: 1px solid var(--line);
      border-bottom: 1px solid var(--line);
      padding: 38px 0;
    }

    .top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 36px;
      margin-bottom: 22px;
    }

    .meta {
      color: var(--muted);
      font-size: 30px;
      line-height: 1.3;
    }

    .site {
      flex: 0 0 auto;
      color: var(--link);
      font-size: 30px;
    }

    h1 {
      max-width: 980px;
      margin: 0;
      color: var(--text);
      font-size: 92px;
      line-height: 1.05;
      font-weight: 700;
      letter-spacing: 0;
      text-decoration: underline;
      text-decoration-color: var(--support-link);
      text-decoration-thickness: 6px;
      text-underline-offset: 14px;
    }

    .footer {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 36px;
      margin-top: auto;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 14px;
      min-width: 0;
      font-family: "JetBrains Mono", monospace;
      font-size: 28px;
    }

    .tag {
      color: var(--muted);
    }

    .cat {
      flex: 0 0 auto;
      margin: 0;
      font-family: "Roboto Slab", serif;
      font-size: 32px;
      line-height: 1.2;
      color: var(--muted);
      white-space: pre;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="top">
      <div class="meta">{date} / {word_count} words / {read_time} min read</div>
      <div class="site">dmaivel.com</div>
    </div>
    <h1>{title}</h1>
    <div class="footer">
      <div class="tags">
{tags}
      </div>
      <pre class="cat">     ╱|、
    (˚ˎ 。7
     |、˜\
    じしˍ,)ノ</pre>
    </div>
  </div>
</body>
</html>
