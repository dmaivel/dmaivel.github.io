{{ $columns := split .Inner "<--->" }}
<div class="columns" style="--columns: {{ len $columns }};">
    {{ range $columns }}
        <div style="min-width: 0; overflow-wrap: break-word;" class="column-inner">
            {{ $content := . | markdownify }}{{ $trimmed := strings.TrimSpace $content }}{{ if and $trimmed (not (hasPrefix $trimmed "<")) }}<p>{{ $content }}</p>{{ else }}{{ $content }}{{ end }}
        </div>
    {{ end }}
</div>
