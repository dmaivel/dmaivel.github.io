{{ define "main" }}
<title>{{ .Title }} - dmaivel</title>
  <br>
  <style>
    .landscape-check {
      display: none;
    }

    @media screen and (orientation:portrait) {
      .landscape-check {
        display: block;
      }
    }
  </style>
  <div style="color: #888;">
    {{ .Date.Format "Jan 2, 2006" }} • {{ .WordCount }} words • {{ .ReadingTime }} mins
  </div>
  <h1 style="margin-bottom: 0px; margin-top: 0px; text-decoration: underline solid #a098b8; -webkit-text-decoration: underline solid #a098b8;">{{ .Title }}</h1>
  <div class="post-tags">
    {{ range .Params.tags }}
      <span class="tag">#{{ . }}</span>
    {{ end }}
  </div>
  <br>
  <!-- <hr> -->
  <!--{{ .TableOfContents }}-->
  <div class="content">
    {{ .Content }}
  </div>
  <hr>
  <a href="https://github.com/sponsors/dmaivel" style="display: inline-block; text-decoration: none; color: #bd824a; border: 2px solid #850; padding: 8px; animation: donate-flash 3s ease-in-out infinite; float: right; margin-bottom: 16px;">
    if you enjoyed this post, please consider supporting my work!
  </a>
  <style>
    @keyframes donate-flash {
      0%, 100% { border-color: #382a1d; }
      50% { border-color: #bd834d; }
    }
  </style>
{{ end }}
