{{ define "main" }}
  <h1>{{ .Title }}</h1>
  <p class="muted post-meta">{{ .Date.Format "Jan 2, 2006" }} / {{ .WordCount }} words / {{ .ReadingTime }} min read{{ with .Params.tags }} / {{ range $i, $tag := . }}{{ $slug := $tag | urlize }}{{ if $i }}, {{ end }}<a href="/tags#{{ $slug }}">#{{ $tag }}</a>{{ end }}{{ end }}</p>

  {{ .Content }}

  <hr>
  <p><a class="support-link" href="https://github.com/sponsors/dmaivel">support my work &lt;3</a></p>

  <footer class="site-footer">
    <hr>
    <p class="site-mark"><a class="site-mark-link" href="/" aria-label="home"></a></p>
  </footer>
{{ end }}
