<!doctype html>
<html lang="{{ .Site.Params.htmlLang | default "en" }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <link rel="icon" href="{{ .Site.Params.favicon | relURL }}" type="image/x-icon">
  <link rel="preload" href="/fonts/roboto-slab-v36-greek_latin-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/roboto-slab-v36-greek_latin-700.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/jetbrains-mono-v24-greek_latin-regular.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="{{ "css/vs.css" | relURL }}">
  <link rel="stylesheet" href="{{ "css/vs-dark.css" | relURL }}" media="(prefers-color-scheme: dark)">
  <link rel="stylesheet" href="{{ "katex/katex.min.css" | relURL }}">
  <link rel="alternate" type="application/rss+xml" title="{{ .Site.Title }}" href="{{ "index.xml" | absURL }}">
  {{ partial "opengraph.html" . }}
  <style>
    @font-face {
      font-display: block;
      font-family: "Roboto Slab";
      font-style: normal;
      font-weight: 400;
      src: url("/fonts/roboto-slab-v36-greek_latin-regular.woff2") format("woff2");
    }

    @font-face {
      font-display: block;
      font-family: "Roboto Slab";
      font-style: normal;
      font-weight: 700;
      src: url("/fonts/roboto-slab-v36-greek_latin-700.woff2") format("woff2");
    }

    @font-face {
      font-display: block;
      font-family: "JetBrains Mono";
      font-style: normal;
      font-weight: 400;
      src: url("/fonts/jetbrains-mono-v24-greek_latin-regular.woff2") format("woff2");
    }

    :root {
      color-scheme: light;
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --line: #dddddd;
      --code-bg: #fbfbfb;
      --link: #1b56c4;
      --support-link: #b83280;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        color-scheme: dark;
        --bg: #111111;
        --text: #dddddd;
        --muted: #999999;
        --line: #333333;
        --code-bg: #171717;
        --link: #9bbcff;
        --support-link: #e78ac3;
      }
    }

    html {
      -webkit-text-size-adjust: 100%;
      text-size-adjust: 100%;
      overflow-anchor: none;
      scrollbar-gutter: stable both-edges;
    }

    body {
      max-width: 720px;
      margin: 20px auto;
      padding: 0 10px 32px;
      background: var(--bg);
      color: var(--text);
      font-family: "Roboto Slab", serif;
      font-size: 18px;
      line-height: 1.55;
    }

    nav {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    nav span {
      display: inline-flex;
      gap: 12px;
    }

    nav a {
      margin-right: 0;
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      line-height: 1.2;
      margin: 28px 0 8px;
    }

    h1 {
      font-size: 42px;
      margin-top: 0;
    }

    .site-title,
    .page-title {
      font-size: 36px;
    }

    h2 {
      font-size: 26px;
    }

    h3 {
      font-size: 22px;
    }

    .content-heading a {
      color: inherit;
      text-decoration: none;
    }

    .content-heading a::before {
      content: "#";
      display: inline-block;
      width: 1em;
      margin-left: -1em;
      color: var(--muted);
      opacity: 0.45;
    }

    .content-heading a:hover::before,
    .content-heading a:focus::before {
      opacity: 1;
    }

    p,
    ul,
    ol,
    pre,
    blockquote,
    table,
    figure {
      margin-top: 0;
      margin-bottom: 14px;
    }

    ul,
    ol {
      padding-left: 24px;
    }

    li {
      margin-bottom: 6px;
    }

    a {
      color: var(--link);
      overflow-wrap: anywhere;
    }

    .support-link {
      color: var(--support-link);
    }

    .site-footer {
      margin-top: 28px;
    }

    .site-mark {
      margin: 0;
      text-align: center;
    }

    .site-mark-link {
      display: inline-block;
      width: 36px;
      height: 36px;
      background: var(--muted);
      -webkit-mask: url("/logo_animated.svg") no-repeat center / contain;
      mask: url("/logo_animated.svg") no-repeat center / contain;
      vertical-align: middle;
    }

    .site-mark-link:hover,
    .site-mark-link:focus {
      background: var(--link);
    }

    hr {
      border: 0;
      border-top: 1px solid var(--line);
      margin: 24px 0;
    }

    img {
      max-width: 100%;
      height: auto;
    }

    .avatar {
      float: right;
      width: 96px;
      height: 96px;
      margin: 0 0 12px 16px;
      border-radius: 6px;
    }

    .muted,
    .post-tags {
      color: var(--muted);
      font-size: 0.9em;
    }

    .post-tags a {
      color: inherit;
    }

    .tag-index {
      font-size: 1em;
    }

    .tag-index a {
      margin-right: 8px;
    }

    .post-meta {
      margin-top: -8px;
      margin-bottom: 24px;
    }

    .post-meta a {
      color: inherit;
    }

    .item-description {
      font-size: 0.9em;
    }

    .not-found-gif {
      float: right;
      width: 128px;
      height: auto;
      margin: 0 0 12px 16px;
    }

    code,
    pre {
      font-family: "JetBrains Mono", monospace;
    }

    code {
      font-size: 0.9em;
      line-height: 1;
    }

    code:not(pre code) {
      background: var(--code-bg);
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 1px 3px;
    }

    pre {
      overflow-x: auto;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 4px;
      background: var(--code-bg);
      font-size: 16px;
      line-height: 1;
    }

    pre code {
      font-size: inherit;
      line-height: 1.2;
    }

    .chroma,
    pre.chroma,
    .highlight pre {
      background-color: var(--code-bg);
    }

    blockquote {
      margin-left: 0;
      padding-left: 14px;
      border-left: 2px solid var(--line);
      color: var(--muted);
    }

    sup {
      position: relative;
      top: -0.45em;
      vertical-align: baseline;
      font-size: 0.72em;
      line-height: 0;
    }

    .table-wrapper,
    .katex-display {
      overflow-x: auto;
      max-width: 100%;
    }

    .katex-display {
      overflow-y: hidden;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }

    th,
    td {
      border: 1px solid var(--line);
      padding: 4px 6px;
      vertical-align: top;
    }

    th {
      background: var(--code-bg);
    }

    tbody tr:nth-child(even) {
      background: color-mix(in srgb, var(--bg) 96%, var(--text));
    }

    figure {
      margin-left: 0;
      margin-right: 0;
      text-align: center;
    }

    figure img {
      display: inline-block;
    }

    figcaption {
      color: var(--muted);
      font-size: 0.9em;
      text-align: center;
    }

    .footnotes {
      overflow-wrap: anywhere;
    }

    .footnotes p {
      white-space: normal;
    }

    .alert {
      --alert-color: var(--muted);
      --alert-bg: var(--code-bg);
      display: flex;
      gap: 10px;
      margin: 16px 0;
      padding: 10px 12px;
      border-left: 3px solid var(--alert-color);
      background: var(--alert-bg);
    }

    .alert-note {
      --alert-color: #6c7f9d;
      --alert-bg: color-mix(in srgb, var(--bg) 90%, #6c7f9d);
    }

    .alert-tip {
      --alert-color: #6f876f;
      --alert-bg: color-mix(in srgb, var(--bg) 90%, #6f876f);
    }

    .alert-important {
      --alert-color: #85759b;
      --alert-bg: color-mix(in srgb, var(--bg) 90%, #85759b);
    }

    .alert-warning {
      --alert-color: #9a7b4f;
      --alert-bg: color-mix(in srgb, var(--bg) 90%, #9a7b4f);
    }

    .alert-caution {
      --alert-color: #9a6767;
      --alert-bg: color-mix(in srgb, var(--bg) 90%, #9a6767);
    }

    .alert-icon {
      flex: 0 0 auto;
      width: 18px;
      height: 18px;
      margin-top: 4px;
      color: var(--alert-color);
    }

    .alert-content {
      min-width: 0;
    }

    .alert-content > :last-child,
    .alert-content p:last-child {
      margin-bottom: 0;
    }

    .alert-title {
      font-weight: 700;
      margin-bottom: 4px;
    }

    .columns {
      display: grid;
      grid-template-columns: repeat(var(--columns), minmax(0, 1fr));
      gap: 16px;
    }

    .column-inner {
      min-width: 0;
      overflow-wrap: break-word;
    }

    .column-inner > *:first-child {
      margin-top: 0;
    }

    .column-inner > *:last-child {
      margin-bottom: 0;
    }

    span.sidenote,
    .sidenote-version {
      display: none;
    }

    .responsive-note .popup-note {
      display: inline;
    }

    @media (max-width: 680px) {
      body {
        margin-top: 14px;
      }

      .avatar {
        float: none;
        display: block;
        margin: 0 0 12px;
      }

      .not-found-gif {
        float: none;
        display: block;
        margin: 0 0 12px;
      }

      .content-heading a::before {
        display: none;
      }

      .columns {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  {{ partial "nav.html" . }}
  {{ block "main" . }}{{ end }}
</body>
</html>
